services:
  subtitle-tool:
    build:
      context: .
      args:
        INSTALL_OCR: "0"
    image: video-dedup-local:latest
    volumes:
      - ./work:/work
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      OPENAI_MODEL_B: ${OPENAI_MODEL_B:-}
      OPENAI_REVIEW_MODEL: ${OPENAI_REVIEW_MODEL:-}
    command: ["--help"]

  subtitle-tool-ocr:
    build:
      context: .
      args:
        INSTALL_OCR: "1"
    image: video-dedup-local:ocr
    volumes:
      - ./work:/work
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      OPENAI_MODEL_B: ${OPENAI_MODEL_B:-}
      OPENAI_REVIEW_MODEL: ${OPENAI_REVIEW_MODEL:-}
    command: ["--help"]
